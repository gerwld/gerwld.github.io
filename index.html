<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>P Jaworski - Front-end Developer</title>
	<meta name="description" content="Main page">
	<link rel="icon" href="favicon.svg" type="image/svg+xml" />
	<link rel="alternate-icon" href="favicon.ico" type="image/png" />
	<!-- preloader styles & noscript -->
	<style>
	 .preloader {display: flex;justify-content: center;align-items: center;position: absolute;top: 0;bottom: 0;left: 0;right: 0;width: 100vw;height: 100vh;background: #353a85;z-index: 100000;user-select: none }.preloader_ld {position: relative;display: inline-block;width: 80px;height: 80px;animation: show 1.2s linear forwards }.preloader_ld:after {content: " ";display: block;width: 64px;height: 64px;margin: 8px;border-radius: 50%;border: 3px solid #fff;border-color: #fff transparent #fff transparent;animation: lds-dual-ring 1.2s linear infinite }@keyframes lds-dual-ring {0% {transform: rotate(0) }100% {transform: rotate(360deg) }}@keyframes show {0% {opacity: 0 }35% {opacity: 0 }100% {opacity: 1 }}
	</style>
	<noscript><style>
		 .preloader_ld:before {content: 'JavaScript is disabled in your browser. Please enable it and try again.';width: 270px;position: absolute;top: 100%;left: calc(50% - 135px);margin-top: 20px;color: #fff;font-size: 16px;text-align: center;line-height: 1.4em }
	</style></noscript>
	<!-- styles -->
	<link rel="stylesheet" href="css/styles.css?v=2.1">
</head>

<body>
	<!-- preloader -->
	<span class="preloader">
		<span class="preloader_ld"></span>
	</span>
	<main>
		<div class="intro">
			<span class="block-wh">Hello, i'm Patrick Jaworski</span>
			<span class="block-wh-js">Hello, <span id="changingText"></span>
			</span>
		</div>
		<div class="tagline">Front-end Dev | Code Enthusiast | Coffee lover</div>
		<div class="icons-social g2-hover">
			<a target="_blank" class="g2-hover__gh" href="https://github.com/gerwld">
				<i class="fab icon-github"></i>
			</a>
			<a target="_blank" class="g2-hover__tg" href="https://t.me/p_jaworski">
				<i class="fab icon-telegram"></i>
			</a>
			<a target="_blank" class="g2-hover__tw" href="https://twitter.com/p_jaworski63">
				<i class="fab icon-twitter"></i>
			</a>
			<a target="_blank" class="g2-hover__fb" href="https://www.facebook.com/p.jaworski63/">
				<i class="fab icon-facebook"></i>
			</a>
			<a target="_blank" class="g2-hover__ld" href="https://www.linkedin.com/in/p-jaworski">
				<i class="fab icon-linkedin"></i>
			</a>
			<a target="_blank" class="g2-hover__bh" href="https://www.behance.net/patryk_jaworski">
				<i class="fab icon-behance"></i>
			</a>
		</div>
		<span class="tagline addit-contact-info">
			<a href="mailto:pjaworski.dev@gmail.com">
				<i class="fa icon-envelope"></i>pjaworski.dev@gmail.com </a>
		</span>
	</main>
	<script>
		window.onload = function () {
			document.querySelector(".preloader").remove();
			let nametext = "i'm Patrick Jaworski";
			let x = 0;
			let txt = nametext.split("");
			let out = "";
			var tmTyping = setTimeout(function () {
				var retyping = setInterval(function () {
					document.getElementById("changingText").innerHTML = out;
					if (x > txt.length - 1) {
						clearInterval(retyping);
						clearTimeout(tmTyping);
					} else {
						out += txt[x];
					}
					x++;
				}, 150);
			}, 1200);
		}
	</script>
</body>

</html>
