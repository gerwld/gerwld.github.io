<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Patyk Jaworski - Front-End Developer</title>
  <meta name="description" content="Main page">
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <style>
    a {
      color: #ffffff !important;
      transition: 0.2s;
      text-decoration: none;
    }

    a:hover {
      background-color: #616161;
    }

    @media only screen and (max-device-width : 667px) {
      #particles-js {
        display: none;
      }

      body {
        font-size: 36px;
      }

      .main-info h1 {
        font-size: 120px;
      }

      .main-info p {
        font-size: 68px;
        margin: 50px 0 25%;
      }

      .social-links a,
      .addit-contact-info a {
        font-size: 57px;
      }

      .social-links a {
        border-width: 7px;
      }

      .addit-contact-info a::before {
        content: "";
        background-image: url("img/mail-mb.svg");
        background-repeat: no-repeat;
        position: absolute;
        width: 28px;
        height: 22px;
        left: -35px;
        top: calc(50% - 8px);
      }

      .tech-icon img {
        display: inline-block;
        width: 60px;
        height: 60px;
        margin-bottom: -5px;
        margin-left: 5px;
        filter: saturate(0.8);
}
  

      ul.social-links {
        margin: 0 0 180px;
      }

      .social-links li {
        margin-bottom: 70px;
      }
    }

    @media only screen and (max-device-width : 320px) {

      .social-links a,
      .addit-contact-info a {
        font-size: 64px;
      }
    }


    @media only screen and (min-device-height : 400px) and (max-device-height : 570px) {
      .main-info {
        min-height: 400px;
      }

      .main-wrapper {
        height: auto;
      }
    }

    @media only screen and (max-device-height : 400px) {
      body {
        height: auto;
      }

      .main-wrapper {
        height: auto;
        min-height: 430px;
      }

      .main-info {
        min-height: 400px;
      }
    }
  </style>
</head>

<body>
  <div class="main-wrapper">
    <div class="main-info">
      <h1>Patryk Jaworski</h1>
      <p>Front-End Developer<span class="tech-icon"><img src="img/favicon.png"></span></p>
      <ul class="social-links">
        <li><a href="https://github.com/gerwld" title="Link on GitHub" target="_blank">GitHub</a></li>
        <li><a href="https://t.me/p_jaworski" title="Link on Telegram" target="_blank">Telegram</a></li>
        <li><a href="https://www.facebook.com/p.jaworski63/" title="Link on Facebook" target="_blank">Facebook</a></li>
        <li><a href="https://twitter.com/p_jaworski63" title="Link on Twitter" target="_blank">Twitter</a></li>
        <!-- <li><a href="https://vk.com/p.jaworski" title="Link on VK" target="_blank">VK</a></li> -->
      </ul>
      <span class="addit-contact-info"><a href="mailto:pjaworski.dev@gmail.com"
          title="Write on email">pjaworski.dev@gmail.com</a></span>
      <div id="particles-js"></div>
      <!-- <div id="particles-js-mobile"></div> -->
    </div>
  </div>
  <script src="./packages/particles/particles.min.js"></script>
  <script src="./script.js"></script>
</body>

</html>
